# WallE3 v2 — VLM Configuration (ROS 2 params format)
# Qwen2.5-VL-3B-Instruct (~2GB VRAM INT4) on RTX 3060 12GB

walle_vlm_planner:
  ros__parameters:
    model_backend: "transformers"
    # 3B model: ~2GB VRAM INT4, inference ~7s/frame
    # 7B model: ~6GB VRAM INT4, inference ~1.5s/frame (if VRAM available)
    model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
    quantize_4bit: true
    language: "en"
    inference_interval_sec: 5.0
    vlm_timeout_sec: 12.0
    max_speed: 0.25

walle_vlm_perception:
  ros__parameters:
    model_backend: "transformers"
    model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
    quantize_4bit: true
    language: "en"
    inference_interval: 10.0
