controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_base_controller:
      type: diff_drive_controller/DiffDriveController

    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

diff_drive_base_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    wheel_separation: 0.39
    wheel_radius: 0.095
    publish_rate: 50.0
    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    tf_frame_prefix_enable: false
    open_loop: false
    position_feedback: true
    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
    velocity_rolling_window_size: 10
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    linear.x.max_velocity: 0.8
    linear.x.min_velocity: -0.5
    linear.x.max_acceleration: 1.5
    linear.x.max_deceleration: -2.0

    angular.z.max_velocity: 1.8
    angular.z.min_velocity: -1.8
    angular.z.max_acceleration: 3.0
    angular.z.max_deceleration: -3.0

head_controller:
  ros__parameters:
    joints:
      - head_yaw_joint
      - head_pitch_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false

arm_controller:
  ros__parameters:
    joints:
      - left_arm_joint
      - right_arm_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false
